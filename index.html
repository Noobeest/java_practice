<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
</head>
<body>
    <h1>To-Do App</h1>
    <h3>Enter "List" to show all tasks</h3>
    <h3>Enter "Add [task]" to add a new task</h3>
    <h3>Enter "Remove [task]" to remove a task</h3>
    <h3>Enter "Clear" to clear all tasks</h3>
    <script src="app.js"></script>
</body>
</html>
